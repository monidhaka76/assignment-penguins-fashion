<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- font- awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwindcss CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <!-- navbar -->
    <header class="bg-[#fffbf0] container mx-auto py-4 relative">
        <nav class="flex justify-between items-center">
            <img src="assist/icons/logo.png" alt="Logo" class="w-[225px] h-[31px]">
            <ul class="flex items-center font-semibold gap-3.5">
                <il>Home</il>
                <il>Product</il>
                <il>About Us</il>
                <il>Contact Us</il>
            </ul>
        </nav>
        <img src="assist/icons/groupdot.png" alt="" class="absolute top-[-70px] left-120">
    </header>

    <!-- banner section -->
    <section class="flex justify-between items-center gap-4 bg-[#fffbf0] min-h-[85vh] container mx-auto">
        <div>
            <h2 class="text-[70px] uppercase font-bold leading-[80px] tracking-tighter[---tracking-2]"> <span
                    class="text-[#FABE4C]">Be the
                    Penguins</span><br>
                <span class="text-[#363958]">of Winter</span>
            </h2>
            <P class="text-[#3E3E3E] text-sm">Lorem Ipsum is simply dummy text of the printing
                <br>and typesetting industry.
            </P>
            <button
                class="w-[170px] h-[60px] bg-gradient-to-r from-[#85A019] to-[#A4BC46] text-white rounded-[10px] inline-block my-3.5"><span><i
                        class="fa-solid fa-cart-arrow-down"></i></span>BUY
                NOW</button>
        </div>
        <div>
            <img src="assist/images/model.png" alt="">
        </div>
    </section>



</body>

</html>
